openapi: "3.1.0"
info:
  title: PAPI - Platform API
  description: |
    Control plane API for managing runtime environments through a unified interface.
    All endpoints under /api/v1/ require bearer token authentication unless noted.
  version: "1.0.0"
  contact:
    name: PAPI Team

servers:
  - url: /api/v1
    description: API v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns platform health status. No authentication required.
      tags: [System]
      security: []
      responses:
        "200":
          description: Platform is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Platform is degraded or unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /info:
    get:
      operationId: getInfo
      summary: Platform information
      description: Returns version and discovery endpoints. No authentication required.
      tags: [System]
      security: []
      responses:
        "200":
          description: Platform info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"

  /namespaces:
    get:
      operationId: listNamespaces
      summary: List accessible namespaces
      description: Returns namespaces the authenticated user has any role in.
      tags: [Namespaces]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: List of accessible namespaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createNamespace
      summary: Create a new namespace
      description: |
        Creates a namespace and queues provisioning across runtime environments.
        Requires "namespace-creator" platform role.
      tags: [Namespaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNamespaceRequest"
      responses:
        "202":
          description: Namespace created, provisioning in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Namespace with this name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /namespaces/{namespaceId}/status:
    get:
      operationId: getNamespaceProvisioningStatus
      summary: Get namespace provisioning status
      description: Returns per-environment provisioning status for a namespace.
      tags: [Namespaces]
      parameters:
        - name: namespaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provisioning status per environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups:
    get:
      operationId: listGroups
      summary: List runtime environment groups
      description: Returns all runtime environment groups. Available to any authenticated user.
      tags: [Groups]
      responses:
        "200":
          description: List of runtime environment groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createGroup
      summary: Create a runtime environment group
      description: Creates a new group. Requires "admin" platform role.
      tags: [Groups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /groups/{groupId}:
    put:
      operationId: updateGroup
      summary: Update a runtime environment group
      description: Updates group configuration. Requires "admin" platform role.
      tags: [Groups]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteGroup
      summary: Delete a runtime environment group
      description: |
        Deletes a group. Requires "admin" platform role.
        Fails if namespaces are still assigned to this group.
      tags: [Groups]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Group has active namespace assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error description

    ValidationErrorResponse:
      type: object
      required: [error, message, details]
      properties:
        error:
          type: string
          enum: [validation_error]
        message:
          type: string
        details:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        environments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [healthy, degraded, unavailable, maintenance]

    InfoResponse:
      type: object
      required: [version, api_version, auth]
      properties:
        version:
          type: string
          description: PAPI application version
        api_version:
          type: string
          enum: ["v1"]
        auth:
          type: object
          required: [oidc_issuer, token_endpoint]
          properties:
            oidc_issuer:
              type: string
              format: uri
            token_endpoint:
              type: string
              format: uri

    NamespaceListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NamespaceSummary"
        pagination:
          $ref: "#/components/schemas/Pagination"

    NamespaceSummary:
      type: object
      required: [id, composite_name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        composite_name:
          type: string
        name_components:
          type: object
          additionalProperties:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: [active, provisioning, failed]
        group_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    CreateNamespaceRequest:
      type: object
      required: [name_components, members]
      properties:
        name_components:
          type: object
          description: Key-value pairs matching the active naming template segments
          additionalProperties:
            type: string
          example:
            team: "payments"
            project: "checkout"
            env: "prod"
        members:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MemberInput"
        metadata:
          type: object
          additionalProperties:
            type: string
        group_id:
          type: string
          format: uuid
          description: Optional; defaults to system-wide default group if omitted

    MemberInput:
      type: object
      required: [identifier, type, role]
      properties:
        identifier:
          type: string
          description: Username or identity group name
        type:
          type: string
          enum: [user, identity_group]
        role:
          type: string
          enum: [read, write, read_write]

    NamespaceResponse:
      type: object
      required: [id, composite_name, status, members, group_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        composite_name:
          type: string
        name_components:
          type: object
          additionalProperties:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: [active, provisioning, failed]
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberOutput"
        group_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    MemberOutput:
      type: object
      required: [id, identifier, type, role]
      properties:
        id:
          type: string
          format: uuid
        identifier:
          type: string
        type:
          type: string
          enum: [user, identity_group]
        role:
          type: string
          enum: [read, write, read_write]

    NamespaceStatusResponse:
      type: object
      required: [namespace_id, overall_status, environments]
      properties:
        namespace_id:
          type: string
          format: uuid
        overall_status:
          type: string
          enum: [active, provisioning, failed]
        environments:
          type: array
          items:
            type: object
            required: [environment_id, environment_name, status]
            properties:
              environment_id:
                type: string
                format: uuid
              environment_name:
                type: string
              status:
                type: string
                enum: [pending, in_progress, completed, failed]
              error_message:
                type: string

    GroupListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroupResponse"

    GroupResponse:
      type: object
      required: [id, name, is_default, orchestration_strategy, environments, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
        orchestration_strategy:
          type: string
          enum: [replicate, canary]
        canary_environment_id:
          type: string
          format: uuid
        environments:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentSummary"
        created_at:
          type: string
          format: date-time

    EnvironmentSummary:
      type: object
      required: [id, name, type, health_status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        health_status:
          type: string
          enum: [healthy, degraded, unavailable, maintenance]

    CreateGroupRequest:
      type: object
      required: [name, environments]
      properties:
        name:
          type: string
        is_default:
          type: boolean
          default: false
        orchestration_strategy:
          type: string
          enum: [replicate, canary]
          default: replicate
        canary_environment_id:
          type: string
          format: uuid
        environments:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, type, connection_config]
            properties:
              name:
                type: string
              type:
                type: string
              connection_config:
                type: object
                additionalProperties: true

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
        is_default:
          type: boolean
        orchestration_strategy:
          type: string
          enum: [replicate, canary]
        canary_environment_id:
          type: string
          format: uuid
        add_environments:
          type: array
          items:
            type: object
            required: [name, type, connection_config]
            properties:
              name:
                type: string
              type:
                type: string
              connection_config:
                type: object
                additionalProperties: true
        remove_environment_ids:
          type: array
          items:
            type: string
            format: uuid

    Pagination:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health and platform discovery (unauthenticated)
  - name: Namespaces
    description: Namespace management
  - name: Groups
    description: Runtime environment group management (admin)
